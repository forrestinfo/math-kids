permissions:
  contents: write

name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'math-kids/**'
  pull_request:
    branches: [master]

jobs:

  build-ci:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
          - os: windows-latest
            target: win
            arch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release
        run: |
          PLATFORM="${{ matrix.target }}"
          if [ "$PLATFORM" = "win" ]; then
            FILE=$(find release -name "*.exe" -type f | head -1)
          else
            FILE=$(find release -name "*.tar.gz" -type f | head -1)
          fi
          if [ -n "$FILE" ]; then
            gh release upload v1.0.0-gaming "$FILE" --clobber --repo forrestinfo/math-kids
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Configure Electron download mirror
        shell: bash
        run: |
          echo "ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/" >> $GITHUB_ENV
          echo "ELECTRON_CUSTOM_DIR={{ version }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --mac --universal
      - name: Upload .app to GitHub Release
        run: |
          cd release/mac-universal
          rm -f ../math-kids-mac-universal.zip
          zip -r ../math-kids-mac-universal.zip math-kids.app
          cd ../..
          gh release upload v1.0.0-gaming release/math-kids-mac-universal.zip --clobber --repo forrestinfo/math-kids
          echo "Uploaded mac app"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
