name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'math-kids/**'
  pull_request:
    branches: [master]

jobs:
  build-ci:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
          - os: windows-latest
            target: win
            arch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release
        run: |
          PLATFORM="${{ matrix.target }}"
          if [ "$PLATFORM" = "win" ]; then
            FILE=$(find release -name "*.exe" -type f | head -1)
          else
            FILE=$(find release -name "*.tar.gz" -type f | head -1)
          fi
          if [ -n "$FILE" ]; then
            gh release upload v1.0.0-gaming "$FILE" --clobber --repo forrestinfo/math-kids
            echo "Uploaded: $FILE"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --mac --universal
      - name: Debug: list release dir
        run: |
          echo "=== Release directory ==="
          ls -la release/
          echo "=== Find .app directories ==="
          find release -type d -name "*.app" 2>/dev/null
          echo "=== Find .app Contents ==="
          find release -type f -name "Contents" 2>/dev/null | head -5
      - name: Upload .app as Release asset
        run: |
          # Try multiple possible locations
          APP_PATH=""
          for path in \
            "release/mac-universal/math-kids.app" \
            "$(find release -type d -name '*.app' 2>/dev/null | head -1)"; do
            if [ -d "$path" ] && [ -n "$path" ]; then
              APP_PATH="$path"
              break
            fi
          done
          echo "Found app at: $APP_PATH"
          if [ -d "$APP_PATH" ]; then
            ZIP_PATH="release/math-kids-mac-universal.zip"
            rm -f "$ZIP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "$ZIP_PATH" "$(basename "$APP_PATH")"
            echo "Zipped successfully"
            gh release upload v1.0.0-gaming "$ZIP_PATH" --clobber --repo forrestinfo/math-kids
            echo "✅ Uploaded mac app to release v1.0.0-gaming"
          else
            echo "ERROR: .app not found"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
