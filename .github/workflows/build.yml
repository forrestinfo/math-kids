permissions:
  contents: write

name: Build Desktop App

env:
  RELEASE_TAG: v1.0.1-difficulty

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'math-kids/**'
  pull_request:
    branches: [master]

jobs:

  build-ci:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
          - os: windows-latest
            target: win
            arch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release (best-effort)
        run: |
          # NOTE: current electron-builder config uses "dir" target on Windows/mac.
          # This step only uploads when a common archive/installer artifact is found.
          FILE=$(find release -maxdepth 2 \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.zip" \) -type f | head -1)
          if [ -n "$FILE" ]; then
            gh release upload "$RELEASE_TAG" "$FILE" --clobber --repo forrestinfo/math-kids
          else
            echo "No uploadable artifact found (dir targets). Skipping upload."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Configure Electron download mirror
        shell: bash
        run: |
          echo "ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Build & Package (mac arm64)
        run: |
          npx vite build
          npx electron-builder --mac --arm64
      - name: Zip .app and upload to GitHub Release
        run: |
          APP=$(find release -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found under release/" && exit 1
          fi
          rm -f release/math-kids-mac-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP" release/math-kids-mac-arm64.zip
          gh release upload "$RELEASE_TAG" release/math-kids-mac-arm64.zip --clobber --repo forrestinfo/math-kids
          echo "Uploaded mac arm64 app"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
