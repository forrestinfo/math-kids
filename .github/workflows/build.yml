name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'math-kids/**'
  pull_request:
    branches: [master]

jobs:

  build-ci:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
          - os: windows-latest
            target: win
            arch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to GitHub Release
        run: |
          PLATFORM="${{ matrix.target }}"
          if [ "$PLATFORM" = "win" ]; then
            FILE=$(find release -name "*.exe" -type f | head -1)
          else
            FILE=$(find release -name "*.tar.gz" -type f | head -1)
          fi
          if [ -n "$FILE" ]; then
            gh release upload v1.0.0-gaming "$FILE" --clobber --repo forrestinfo/math-kids
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build & Package
        run: |
          npx vite build
          npx electron-builder --mac --universal
      - name: Debug release dir
        run: |
          find release -type d -name "*.app"
          ls -la release/
        shell: bash
      - name: Upload .app as Release asset
        run: |
          APP_DIR=$(find release -type d -name "*.app" | head -1)
          if [ -z "$APP_DIR" ]; then
            APP_DIR="release/mac-universal/math-kids.app"
          fi
          if [ -d "$APP_DIR" ]; then
            APP_NAME=$(basename "$APP_DIR")
            ZIP_PATH="release/math-kids-mac-universal.zip"
            rm -f "$ZIP_PATH"
            cd release
            zip -r "$ZIP_PATH" "$APP_NAME"
            cd ..
            gh release upload v1.0.0-gaming "$ZIP_PATH" --clobber --repo forrestinfo/math-kids
          else
            echo "ERROR: app not found at $APP_DIR"
            exit 1
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
